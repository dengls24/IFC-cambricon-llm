<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">IFC Cambricon-LLM simulator architecture</title>
  <desc id="desc">Editable architecture diagram showing paper inputs, reconstructed NAND and NPU timing paths, C simulator, SSDsim-derived backend, SystemC replay checker, SystemC component model, and published artifacts.</desc>
  <defs>
    <marker id="arrow-data" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1f6f8b"/>
    </marker>
    <marker id="arrow-control" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#6b5b95"/>
    </marker>
    <marker id="arrow-verify" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2d7d46"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .group { fill: #f7f9fb; stroke: #c7d2df; stroke-width: 2; }
      .group-title { font: 700 22px Arial, sans-serif; fill: #263445; }
      .node { stroke-width: 2.2; rx: 10; ry: 10; }
      .input { fill: #eef4ff; stroke: #5478b8; }
      .storage { fill: #eff8f2; stroke: #4f8c5f; }
      .compute { fill: #fff5e8; stroke: #b8782d; }
      .verify { fill: #f1fbf4; stroke: #2d7d46; }
      .output { fill: #f6f1ff; stroke: #6b5b95; }
      .label { font: 600 19px Arial, sans-serif; fill: #202a36; text-anchor: middle; }
      .small { font: 500 15px Arial, sans-serif; fill: #3c4a58; text-anchor: middle; }
      .edge-data { fill: none; stroke: #1f6f8b; stroke-width: 3; marker-end: url(#arrow-data); }
      .edge-control { fill: none; stroke: #6b5b95; stroke-width: 2.7; stroke-dasharray: 8 6; marker-end: url(#arrow-control); }
      .edge-verify { fill: none; stroke: #2d7d46; stroke-width: 2.7; stroke-dasharray: 3 5; marker-end: url(#arrow-verify); }
      .edge-label { font: 600 14px Arial, sans-serif; fill: #344255; paint-order: stroke; stroke: #ffffff; stroke-width: 5; stroke-linejoin: round; }
      .annotation { fill: #fffbe7; stroke: #c7a53a; stroke-width: 2; rx: 8; ry: 8; }
      .annotation-text { font: 700 15px Arial, sans-serif; fill: #4b3b05; text-anchor: middle; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="900"/>

  <rect class="group" x="70" y="95" width="330" height="255" rx="14"/>
  <text class="group-title" x="95" y="130">Paper inputs</text>
  <rect class="group" x="440" y="95" width="930" height="390" rx="14"/>
  <text class="group-title" x="465" y="130">Reconstructed hardware timing path</text>
  <rect class="group" x="70" y="540" width="1300" height="250" rx="14"/>
  <text class="group-title" x="95" y="575">Simulator and validation backends</text>

  <rect class="node input" x="105" y="145" width="270" height="78" rx="10"/>
  <text class="label" x="240" y="177">Cambricon-LLM paper</text>
  <text class="small" x="240" y="202">Figure 9 W8A8 points</text>

  <rect class="node input" x="105" y="250" width="270" height="78" rx="10"/>
  <text class="label" x="240" y="282">Table II flash profiles</text>
  <text class="small" x="240" y="307">Section V tiling equations</text>

  <rect class="node input" x="480" y="145" width="230" height="80" rx="10"/>
  <text class="label" x="595" y="177">Model and system profiles</text>
  <text class="small" x="595" y="202">OPT / LLaMA2, 1K context</text>

  <rect class="node storage" x="760" y="130" width="260" height="95" rx="10"/>
  <text class="label" x="890" y="166">NAND flash chiplet</text>
  <text class="small" x="890" y="193">channels / chips / dies / planes</text>

  <rect class="node compute" x="760" y="275" width="260" height="95" rx="10"/>
  <text class="label" x="890" y="311">In-flash compute path</text>
  <text class="small" x="890" y="338">READ_COMPUTE + READ_SLICE</text>

  <rect class="node compute" x="1090" y="145" width="230" height="80" rx="10"/>
  <text class="label" x="1205" y="177">NPU path</text>
  <text class="small" x="1205" y="202">2 TOPS INT8 PE array</text>

  <rect class="node storage" x="1090" y="300" width="230" height="80" rx="10"/>
  <text class="label" x="1205" y="332">DRAM attention cache</text>
  <text class="small" x="1205" y="357">40 GB/s path</text>

  <rect class="node compute" x="105" y="605" width="250" height="85" rx="10"/>
  <text class="label" x="230" y="638">C timing simulator</text>
  <text class="small" x="230" y="664">tile model + TPOT + token/s</text>

  <rect class="node compute" x="430" y="605" width="270" height="85" rx="10"/>
  <text class="label" x="565" y="638">SSDsim-derived backend</text>
  <text class="small" x="565" y="664">command-stage + event loop</text>

  <rect class="node verify" x="775" y="590" width="250" height="70" rx="10"/>
  <text class="label" x="900" y="619">SystemC replay checker</text>
  <text class="small" x="900" y="643">exact event equivalence</text>

  <rect class="node verify" x="775" y="695" width="250" height="70" rx="10"/>
  <text class="label" x="900" y="724">SystemC component model</text>
  <text class="small" x="900" y="748">controller + execution fabric</text>

  <rect class="node output" x="1110" y="620" width="245" height="95" rx="10"/>
  <text class="label" x="1232.5" y="657">Published artifacts</text>
  <text class="small" x="1232.5" y="684">CSV / JSON / SVG / VCD</text>

  <path class="edge-control" d="M375,184 C430,184 430,185 480,185"/>
  <text class="edge-label" x="425" y="171">reference rows</text>
  <path class="edge-control" d="M375,289 C530,289 620,178 760,178"/>
  <text class="edge-label" x="535" y="247">platform params</text>
  <path class="edge-data" d="M710,185 C735,185 735,178 760,178"/>
  <text class="edge-label" x="735" y="166">weight tiles</text>
  <path class="edge-data" d="M890,225 L890,275"/>
  <text class="edge-label" x="912" y="254">page read + vector</text>
  <path class="edge-data" d="M1020,323 C1060,323 1062,185 1090,185"/>
  <text class="edge-label" x="1052" y="248">tiled weight stage</text>
  <path class="edge-data" d="M1205,300 L1205,225"/>
  <text class="edge-label" x="1223" y="268">attention cache</text>

  <path class="edge-control" d="M595,225 C595,430 230,430 230,605"/>
  <text class="edge-label" x="410" y="454">profiles</text>
  <path class="edge-control" d="M890,370 C890,515 565,515 565,605"/>
  <text class="edge-label" x="725" y="500">extended commands</text>
  <path class="edge-control" d="M355,648 L430,648"/>
  <text class="edge-label" x="392" y="633">command stream</text>
  <path class="edge-verify" d="M700,632 C735,632 735,625 775,625"/>
  <text class="edge-label" x="735" y="612">event contract</text>
  <path class="edge-verify" d="M700,666 C735,666 735,730 775,730"/>
  <text class="edge-label" x="735" y="714">module split</text>
  <path class="edge-data" d="M355,675 C690,825 965,710 1110,675"/>
  <text class="edge-label" x="735" y="810">Figure 9 results</text>
  <path class="edge-verify" d="M1025,625 L1110,650"/>
  <text class="edge-label" x="1067" y="619">exact PASS</text>
  <path class="edge-verify" d="M1025,730 L1110,692"/>
  <text class="edge-label" x="1067" y="739">bounded delta</text>

  <rect class="annotation" x="1060" y="500" width="325" height="52" rx="8"/>
  <text class="annotation-text" x="1222.5" y="521">Direct paper comparison:</text>
  <text class="annotation-text" x="1222.5" y="541">21 points, 8.341% mean abs error</text>

  <rect class="annotation" x="1060" y="565" width="325" height="52" rx="8"/>
  <text class="annotation-text" x="1222.5" y="586">SystemC component delta:</text>
  <text class="annotation-text" x="1222.5" y="606">+85.5 ns, 0.027039% vs C backend</text>
</svg>
