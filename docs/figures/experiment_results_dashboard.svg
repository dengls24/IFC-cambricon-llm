<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">IFC Cambricon-LLM experimental results dashboard</title>
  <desc id="desc">Academic-style multi-panel result dashboard showing Figure 9 reproduction errors, paper versus simulator agreement, ablation speedups, and SystemC validation deltas.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #ffffff; stroke: #d5dde7; stroke-width: 1.6; rx: 12; ry: 12; }
      .panel-title { font: 700 22px Arial, Helvetica, sans-serif; fill: #17212f; }
      .subtitle { font: 500 15px Arial, Helvetica, sans-serif; fill: #506070; }
      .axis { stroke: #222b36; stroke-width: 1.4; }
      .grid { stroke: #e5e9ef; stroke-width: 1; }
      .tick { font: 500 12px Arial, Helvetica, sans-serif; fill: #4b5563; }
      .label { font: 600 14px Arial, Helvetica, sans-serif; fill: #253040; }
      .small { font: 500 12px Arial, Helvetica, sans-serif; fill: #4b5563; }
      .cell-text { font: 700 14px Arial, Helvetica, sans-serif; text-anchor: middle; fill: #17212f; }
      .legend-text { font: 600 13px Arial, Helvetica, sans-serif; fill: #334155; }
      .metric { font: 700 26px Arial, Helvetica, sans-serif; fill: #17212f; }
      .metric-label { font: 600 13px Arial, Helvetica, sans-serif; fill: #506070; }
      .paper-band { fill: #dfeaf7; opacity: 0.9; }
      .obs-bar { fill: #1f6f8b; }
      .mean-dot { fill: #f2a541; stroke: #ffffff; stroke-width: 2; }
      .pass { fill: #edf8f0; stroke: #2d7d46; stroke-width: 1.5; rx: 8; ry: 8; }
      .pass-text { font: 700 14px Arial, Helvetica, sans-serif; fill: #23613a; text-anchor: middle; }
      .note { font: 600 13px Arial, Helvetica, sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="980"/>
  <text x="80" y="54" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="800" fill="#111827">Experimental Results Summary</text>
  <text x="80" y="82" class="subtitle">Cambricon-LLM Figure 9 reproduction, ablation checks, and C/SystemC cross-validation.</text>

  <rect class="panel" x="60" y="115" width="700" height="395"/>
  <text x="90" y="154" class="panel-title">A. Figure 9 relative-error heatmap</text>
  <text x="90" y="179" class="subtitle">Signed error in token/s for 21 W8A8 paper points. All points remain within the +/-15% bound.</text>

  <text x="111" y="257" class="label">S</text>
  <text x="111" y="322" class="label">M</text>
  <text x="111" y="387" class="label">L</text>
  <text x="92" y="456" class="small">Platform</text>
  <text x="179" y="208" class="small" transform="rotate(-28 179 208)">OPT-6.7B</text>
  <text x="267" y="208" class="small" transform="rotate(-28 267 208)">OPT-13B</text>
  <text x="355" y="208" class="small" transform="rotate(-28 355 208)">OPT-30B</text>
  <text x="443" y="208" class="small" transform="rotate(-28 443 208)">OPT-66B</text>
  <text x="531" y="208" class="small" transform="rotate(-28 531 208)">LLaMA2-7B</text>
  <text x="619" y="208" class="small" transform="rotate(-28 619 208)">LLaMA2-13B</text>
  <text x="707" y="208" class="small" transform="rotate(-28 707 208)">LLaMA2-70B</text>

  <rect x="145" y="230" width="78" height="56" fill="#f8dfc1" stroke="#ffffff" stroke-width="2"/><text x="184" y="264" class="cell-text">+1.8</text>
  <rect x="233" y="230" width="78" height="56" fill="#e5edf4" stroke="#ffffff" stroke-width="2"/><text x="272" y="264" class="cell-text">-1.1</text>
  <rect x="321" y="230" width="78" height="56" fill="#f2f2f2" stroke="#ffffff" stroke-width="2"/><text x="360" y="264" class="cell-text">-0.1</text>
  <rect x="409" y="230" width="78" height="56" fill="#6aa6cc" stroke="#ffffff" stroke-width="2"/><text x="448" y="264" class="cell-text">-12.4</text>
  <rect x="497" y="230" width="78" height="56" fill="#f8dfc1" stroke="#ffffff" stroke-width="2"/><text x="536" y="264" class="cell-text">+1.2</text>
  <rect x="585" y="230" width="78" height="56" fill="#e5edf4" stroke="#ffffff" stroke-width="2"/><text x="624" y="264" class="cell-text">-1.1</text>
  <rect x="673" y="230" width="78" height="56" fill="#df8740" stroke="#ffffff" stroke-width="2"/><text x="712" y="264" class="cell-text">+12.4</text>

  <rect x="145" y="295" width="78" height="56" fill="#9ecae1" stroke="#ffffff" stroke-width="2"/><text x="184" y="329" class="cell-text">-8.7</text>
  <rect x="233" y="295" width="78" height="56" fill="#e59d54" stroke="#ffffff" stroke-width="2"/><text x="272" y="329" class="cell-text">+11.6</text>
  <rect x="321" y="295" width="78" height="56" fill="#b6d5e8" stroke="#ffffff" stroke-width="2"/><text x="360" y="329" class="cell-text">-7.7</text>
  <rect x="409" y="295" width="78" height="56" fill="#76afd1" stroke="#ffffff" stroke-width="2"/><text x="448" y="329" class="cell-text">-11.8</text>
  <rect x="497" y="295" width="78" height="56" fill="#d1e3f0" stroke="#ffffff" stroke-width="2"/><text x="536" y="329" class="cell-text">-3.9</text>
  <rect x="585" y="295" width="78" height="56" fill="#e59d54" stroke="#ffffff" stroke-width="2"/><text x="624" y="329" class="cell-text">+11.6</text>
  <rect x="673" y="295" width="78" height="56" fill="#f3c797" stroke="#ffffff" stroke-width="2"/><text x="712" y="329" class="cell-text">+4.1</text>

  <rect x="145" y="360" width="78" height="56" fill="#4f8fc0" stroke="#ffffff" stroke-width="2"/><text x="184" y="394" class="cell-text">-14.3</text>
  <rect x="233" y="360" width="78" height="56" fill="#dd8940" stroke="#ffffff" stroke-width="2"/><text x="272" y="394" class="cell-text">+12.8</text>
  <rect x="321" y="360" width="78" height="56" fill="#7fb5d4" stroke="#ffffff" stroke-width="2"/><text x="360" y="394" class="cell-text">-11.4</text>
  <rect x="409" y="360" width="78" height="56" fill="#eeb674" stroke="#ffffff" stroke-width="2"/><text x="448" y="394" class="cell-text">+9.1</text>
  <rect x="497" y="360" width="78" height="56" fill="#9ac8df" stroke="#ffffff" stroke-width="2"/><text x="536" y="394" class="cell-text">-8.9</text>
  <rect x="585" y="360" width="78" height="56" fill="#d46f2c" stroke="#ffffff" stroke-width="2"/><text x="624" y="394" class="cell-text">+14.4</text>
  <rect x="673" y="360" width="78" height="56" fill="#4b8dbd" stroke="#ffffff" stroke-width="2"/><text x="712" y="394" class="cell-text">-14.6</text>

  <text x="145" y="455" class="legend-text">Negative</text>
  <rect x="210" y="441" width="42" height="14" fill="#4b8dbd"/>
  <rect x="252" y="441" width="42" height="14" fill="#b6d5e8"/>
  <rect x="294" y="441" width="42" height="14" fill="#f2f2f2"/>
  <rect x="336" y="441" width="42" height="14" fill="#f3c797"/>
  <rect x="378" y="441" width="42" height="14" fill="#d46f2c"/>
  <text x="430" y="455" class="legend-text">Positive</text>
  <text x="548" y="455" class="note">Mean abs: 8.341%; max abs: 14.618%</text>

  <rect class="panel" x="800" y="115" width="540" height="395"/>
  <text x="830" y="154" class="panel-title">B. Paper vs simulator agreement</text>
  <text x="830" y="179" class="subtitle">Log-scale token/s comparison across all model/platform points.</text>
  <line x1="830" y1="500" x2="1370" y2="500" class="axis"/>
  <line x1="830" y1="170" x2="830" y2="500" class="axis"/>
  <line x1="849" y1="500" x2="849" y2="170" class="grid"/><text x="849" y="520" class="tick" text-anchor="middle">0.3</text>
  <line x1="974" y1="500" x2="974" y2="170" class="grid"/><text x="974" y="520" class="tick" text-anchor="middle">1</text>
  <line x1="1088" y1="500" x2="1088" y2="170" class="grid"/><text x="1088" y="520" class="tick" text-anchor="middle">3</text>
  <line x1="1214" y1="500" x2="1214" y2="170" class="grid"/><text x="1214" y="520" class="tick" text-anchor="middle">10</text>
  <line x1="1328" y1="500" x2="1328" y2="170" class="grid"/><text x="1328" y="520" class="tick" text-anchor="middle">30</text>
  <line x1="830" y1="488" x2="1370" y2="488" class="grid"/><text x="816" y="492" class="tick" text-anchor="end">0.3</text>
  <line x1="830" y1="412" x2="1370" y2="412" class="grid"/><text x="816" y="416" class="tick" text-anchor="end">1</text>
  <line x1="830" y1="342" x2="1370" y2="342" class="grid"/><text x="816" y="346" class="tick" text-anchor="end">3</text>
  <line x1="830" y1="266" x2="1370" y2="266" class="grid"/><text x="816" y="270" class="tick" text-anchor="end">10</text>
  <line x1="830" y1="196" x2="1370" y2="196" class="grid"/><text x="816" y="200" class="tick" text-anchor="end">30</text>
  <path d="M849,488 L1328,196" fill="none" stroke="#111827" stroke-width="2.2"/>
  <path d="M849,477 L1328,184" fill="none" stroke="#d97706" stroke-width="1.4" stroke-dasharray="6 5"/>
  <path d="M849,500 L1328,207" fill="none" stroke="#d97706" stroke-width="1.4" stroke-dasharray="6 5"/>
  <text x="1185" y="219" class="small">y = x, dashed +/-15%</text>

  <circle cx="1107.4" cy="329.4" r="5.5" fill="#2563eb"/><circle cx="1223.5" cy="265.3" r="5.5" fill="#16a34a"/><circle cx="1347.7" cy="193.4" r="5.5" fill="#d97706"/>
  <circle cx="1040.9" cy="371.8" r="5.5" fill="#2563eb"/><circle cx="1135.1" cy="306.6" r="5.5" fill="#16a34a"/><circle cx="1250.1" cy="235.6" r="5.5" fill="#d97706"/>
  <circle cx="951.0" cy="426.1" r="5.5" fill="#2563eb"/><circle cx="1069.4" cy="358.8" r="5.5" fill="#16a34a"/><circle cx="1185.1" cy="290.7" r="5.5" fill="#d97706"/>
  <circle cx="878.9" cy="478.5" r="5.5" fill="#2563eb"/><circle cx="993.1" cy="408.3" r="5.5" fill="#16a34a"/><circle cx="1073.5" cy="345.7" r="5.5" fill="#d97706"/>
  <circle cx="1107.4" cy="329.7" r="5.5" fill="#2563eb"/><circle cx="1217.7" cy="265.6" r="5.5" fill="#16a34a"/><circle cx="1340.9" cy="193.8" r="5.5" fill="#d97706"/>
  <circle cx="1040.9" cy="371.8" r="5.5" fill="#2563eb"/><circle cx="1135.1" cy="306.6" r="5.5" fill="#16a34a"/><circle cx="1248.6" cy="235.6" r="5.5" fill="#d97706"/>
  <circle cx="849.0" cy="481.0" r="5.5" fill="#2563eb"/><circle cx="974.2" cy="409.4" r="5.5" fill="#16a34a"/><circle cx="1101.4" cy="344.2" r="5.5" fill="#d97706"/>
  <text x="1095" y="552" class="label" text-anchor="middle">Paper reference token/s</text>
  <text x="778" y="335" class="label" text-anchor="middle" transform="rotate(-90 778 335)">Simulator token/s</text>
  <circle cx="980" cy="475" r="5" fill="#2563eb"/><text x="992" y="480" class="small">S</text>
  <circle cx="1030" cy="475" r="5" fill="#16a34a"/><text x="1042" y="480" class="small">M</text>
  <circle cx="1080" cy="475" r="5" fill="#d97706"/><text x="1092" y="480" class="small">L</text>

  <rect class="panel" x="60" y="555" width="700" height="320"/>
  <text x="90" y="594" class="panel-title">C. Paper-style ablation checks on Cambricon-LLM-S</text>
  <text x="90" y="619" class="subtitle">Observed speedup ranges fall inside the paper-reported windows.</text>
  <line x1="190" y1="800" x2="670" y2="800" class="axis"/>
  <text x="190" y="823" class="tick" text-anchor="middle">1.2x</text><text x="338" y="823" class="tick" text-anchor="middle">1.4x</text>
  <text x="486" y="823" class="tick" text-anchor="middle">1.6x</text><text x="634" y="823" class="tick" text-anchor="middle">1.8x</text>
  <text x="100" y="690" class="label">Read slicing</text>
  <rect x="485" y="665" width="149" height="30" class="paper-band"/><text x="560" y="658" class="small" text-anchor="middle">paper: 1.6x-1.8x</text>
  <rect x="548" y="672" width="12" height="16" class="obs-bar"/><circle cx="554" cy="680" r="6" class="mean-dot"/>
  <text x="582" y="684" class="label">sim: 1.683x-1.699x</text>
  <text x="100" y="755" class="label">HW-aware tiling</text>
  <rect x="264" y="730" width="74" height="30" class="paper-band"/><text x="301" y="723" class="small" text-anchor="middle">paper: 1.3x-1.4x</text>
  <rect x="294" y="737" width="7" height="16" class="obs-bar"/><circle cx="298" cy="745" r="6" class="mean-dot"/>
  <text x="330" y="749" class="label">sim: 1.341x-1.349x</text>
  <rect x="90" y="835" width="630" height="1" fill="#e5e9ef"/>
  <text x="90" y="855" class="note">Full ablation tables are in results/figure12_read_slice_ablation.csv and results/figure14_tiling_ablation.csv.</text>

  <rect class="panel" x="800" y="555" width="540" height="320"/>
  <text x="830" y="594" class="panel-title">D. C/SystemC cross-validation</text>
  <text x="830" y="619" class="subtitle">The SystemC paths audit command timing without overclaiming RTL equivalence.</text>
  <rect class="pass" x="830" y="655" width="220" height="78"/>
  <text x="940" y="682" class="metric" text-anchor="middle">0 cycles</text>
  <text x="940" y="706" class="metric-label" text-anchor="middle">SystemC replay delta</text>
  <text x="940" y="724" class="pass-text">PASS</text>
  <rect class="pass" x="1090" y="655" width="220" height="78"/>
  <text x="1200" y="682" class="metric" text-anchor="middle">+85.5 ns</text>
  <text x="1200" y="706" class="metric-label" text-anchor="middle">Component final-time delta</text>
  <text x="1200" y="724" class="pass-text">0.027039%</text>
  <line x1="850" y1="780" x2="1290" y2="780" class="grid"/>
  <text x="850" y="770" class="small">C backend final time</text>
  <text x="1290" y="770" class="small" text-anchor="end">316207.000000 ns</text>
  <line x1="850" y1="820" x2="1290" y2="820" class="grid"/>
  <text x="850" y="810" class="small">SystemC component final time</text>
  <text x="1290" y="810" class="small" text-anchor="end">316292.500000 ns</text>
  <text x="850" y="848" class="note">Events and completed commands match exactly: 1536 events, 256 completed commands.</text>

  <text x="80" y="930" class="small">All numbers are generated from checked artifacts in results/. The SystemC component model is a command-cycle cross-check, not a full RTL model.</text>
</svg>
